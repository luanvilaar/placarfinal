<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOX Squads Header</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 340px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .hero {
    width: 1280px;
    height: 340px;
    background: #050505;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Subtle radial gradient */
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 45%, rgba(209, 255, 0, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Grid pattern overlay */
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(209, 255, 0, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(209, 255, 0, 0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Logo */
  .logo-container {
    margin-bottom: 32px;
  }

  .logo-container svg {
    height: 85px;
    width: auto;
  }

  /* Bottom tags */
  .tags {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.03);
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #696969;
    letter-spacing: 0.3px;
  }

  .tag-icon {
    font-size: 14px;
    opacity: 0.6;
  }

  /* Decorative corner accents */
  .corner {
    position: absolute;
    width: 48px;
    height: 48px;
    z-index: 1;
  }

  .corner-tl {
    top: 20px; left: 20px;
    border-top: 1px solid rgba(209, 255, 0, 0.1);
    border-left: 1px solid rgba(209, 255, 0, 0.1);
  }

  .corner-tr {
    top: 20px; right: 20px;
    border-top: 1px solid rgba(209, 255, 0, 0.1);
    border-right: 1px solid rgba(209, 255, 0, 0.1);
  }

  .corner-bl {
    bottom: 20px; left: 20px;
    border-bottom: 1px solid rgba(209, 255, 0, 0.1);
    border-left: 1px solid rgba(209, 255, 0, 0.1);
  }

  .corner-br {
    bottom: 20px; right: 20px;
    border-bottom: 1px solid rgba(209, 255, 0, 0.1);
    border-right: 1px solid rgba(209, 255, 0, 0.1);
  }
</style>
</head>
<body>
  <div class="hero">
    <!-- Corner decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
